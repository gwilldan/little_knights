services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    working_dir: /app
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: npm run dev
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - redis
      - postgres
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tsconfig.json
          target: /app/tsconfig.json
        - action: rebuild
          path: ./package.json

volumes:
  postgres_data:
  redis_data:
